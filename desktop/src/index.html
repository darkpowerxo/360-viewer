<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>360 Viewer</h1>

    <div class="field">
      <label>Media Folder</label>
      <div class="row">
        <input type="text" id="mediaPath" readonly placeholder="Select a folder...">
        <button id="browseBtn" class="btn btn-secondary">Browse</button>
      </div>
    </div>

    <div class="field">
      <label>Port</label>
      <input type="number" id="portInput" value="3443" min="1024" max="65535">
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-start" disabled>Start Server</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Stop Server</button>
    </div>

    <div class="status-row">
      <span id="statusDot" class="dot stopped"></span>
      <span id="statusText">Stopped</span>
    </div>

    <div id="serverUrl" class="url-box" style="display:none">
      <a id="urlLink" href="#">Open in Browser</a>
    </div>

    <div class="log-section">
      <label>Server Log</label>
      <pre id="log"></pre>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
